# Fluxa example configuration.
#
# Starting with v1.1 the providers and routes sections live in the SQLite
# database referenced by `database.path`. This YAML file is only used for:
#
#   * Server / logging / database path bootstrap (always).
#   * First-run seed: if the providers table is empty the gateway will
#     copy the providers and routes declared here into the database on
#     startup. On subsequent starts the file is ignored for those two
#     sections — use the /admin REST API to mutate them live.
#
# ${VAR} and ${VAR:-default} placeholders are expanded from the process
# environment at load time so secrets can stay outside the file.

server:
  host: 0.0.0.0
  port: 8080
  master_key: ${FLUXA_MASTER_KEY}   # Required to enable the /admin endpoints

database:
  path: ./fluxa.db                  # SQLite database that stores providers and routes

logging:
  level: info
  format: json
  store_content: false              # Set true to persist prompt bodies in the request log

# ---------------------------------------------------------------------------
# Everything below this line is optional and only consumed the very first
# time the gateway boots against an empty database. Delete the file (or this
# section) once you have seeded the store — the admin API is the source of
# truth from that point on.
# ---------------------------------------------------------------------------

providers:
  - name: openai
    kind: openai
    api_key: ${OPENAI_API_KEY}
    base_url: https://api.openai.com/v1

  - name: anthropic
    kind: anthropic
    api_key: ${ANTHROPIC_API_KEY}
    base_url: https://api.anthropic.com

  - name: deepseek
    kind: deepseek
    api_key: ${DEEPSEEK_API_KEY}
    base_url: https://api.deepseek.com/v1

  - name: qwen
    kind: qwen
    api_key: ${QWEN_API_KEY}
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

  - name: ollama
    kind: ollama
    base_url: http://localhost:11434/v1   # Ollama runs without an API key

  # --- v4.0 additional OpenAI-compatible providers ---

  - name: moonshot
    kind: moonshot                        # Kimi / Moonshot
    api_key: ${MOONSHOT_API_KEY}
    base_url: https://api.moonshot.cn/v1

  - name: zhipu
    kind: zhipu                           # 智谱 GLM
    api_key: ${ZHIPU_API_KEY}
    base_url: https://open.bigmodel.cn/api/paas/v4

  - name: doubao
    kind: doubao                          # 豆包 / Volcengine Ark
    api_key: ${DOUBAO_API_KEY}
    base_url: https://ark.cn-beijing.volces.com/api/v3

  - name: ernie
    kind: ernie                           # 文心一言 / Baidu Qianfan v2
    api_key: ${ERNIE_API_KEY}
    base_url: https://qianfan.baidubce.com/v2

  # Google Gemini — native translation to/from OpenAI wire format.
  - name: gemini
    kind: gemini
    api_key: ${GEMINI_API_KEY}
    base_url: https://generativelanguage.googleapis.com/v1beta

  # AWS Bedrock — signs requests with in-tree SigV4, uses the unified
  # Converse API so a single provider entry works across Claude, Llama,
  # Mistral, Titan, and any future Bedrock-hosted family.
  - name: bedrock
    kind: bedrock
    region: us-east-1
    access_key: ${AWS_ACCESS_KEY_ID}
    secret_key: ${AWS_SECRET_ACCESS_KEY}
    session_token: ${AWS_SESSION_TOKEN:-}

  # Azure OpenAI — deployments map canonical model IDs to Azure deployments.
  - name: azure
    kind: azure
    api_key: ${AZURE_OPENAI_API_KEY}
    base_url: https://my-resource.openai.azure.com
    api_version: "2024-06-01"
    deployments:
      gpt-4o: prod-gpt4o
      gpt-4o-mini: prod-gpt4o-mini

  # --- Western OpenAI-compatible vendors (optional) ---

  - name: mistral
    kind: mistral
    api_key: ${MISTRAL_API_KEY}

  - name: groq
    kind: groq
    api_key: ${GROQ_API_KEY}

  - name: xai
    kind: xai                                 # Grok
    api_key: ${XAI_API_KEY}

  - name: perplexity
    kind: perplexity
    api_key: ${PERPLEXITY_API_KEY}

  - name: together
    kind: together
    api_key: ${TOGETHER_API_KEY}

  - name: fireworks
    kind: fireworks
    api_key: ${FIREWORKS_API_KEY}

  - name: openrouter
    kind: openrouter
    api_key: ${OPENROUTER_API_KEY}

  - name: cohere
    kind: cohere                              # via /compatibility/v1
    api_key: ${COHERE_API_KEY}

  - name: nvidia
    kind: nvidia                              # NVIDIA NIM / build.nvidia.com
    api_key: ${NVIDIA_API_KEY}

  # --- More Chinese OpenAI-compatible vendors (optional) ---

  - name: siliconflow
    kind: siliconflow                         # 硅基流动
    api_key: ${SILICONFLOW_API_KEY}

  - name: minimax
    kind: minimax                             # MiniMax
    api_key: ${MINIMAX_API_KEY}

  - name: baichuan
    kind: baichuan                            # 百川智能
    api_key: ${BAICHUAN_API_KEY}

  - name: stepfun
    kind: stepfun                             # 阶跃星辰
    api_key: ${STEPFUN_API_KEY}

  - name: spark
    kind: spark                               # 讯飞星火
    api_key: ${SPARK_API_KEY}

  - name: zero-one
    kind: zero-one                            # 零一万物 Yi
    api_key: ${YI_API_KEY}

  - name: tencent
    kind: tencent                             # 腾讯混元
    api_key: ${HUNYUAN_API_KEY}

routes:
  - model: gpt-4o
    provider: openai
    fallback: [deepseek]
  - model: gpt-4o-mini
    provider: openai
  - model: claude-3-5-sonnet
    provider: anthropic
  - model: claude-3-5-sonnet-20241022
    provider: anthropic
  - model: deepseek-chat
    provider: deepseek
  - model: deepseek-reasoner
    provider: deepseek
  - model: qwen-max
    provider: qwen
  - model: qwen-plus
    provider: qwen
  - model: llama3.1
    provider: ollama

  # v4.0 additional providers
  - model: moonshot-v1-8k
    provider: moonshot
  - model: moonshot-v1-32k
    provider: moonshot
  - model: kimi-k2-0711-preview
    provider: moonshot
  - model: glm-4
    provider: zhipu
  - model: glm-4-flash
    provider: zhipu
  - model: doubao-pro-32k
    provider: doubao
  - model: ernie-4.0-8k
    provider: ernie
  - model: ernie-3.5-8k
    provider: ernie
  - model: gemini-1.5-pro
    provider: gemini
  - model: gemini-2.0-flash
    provider: gemini
  - model: anthropic.claude-3-5-sonnet-20241022-v2:0
    provider: bedrock
  - model: meta.llama3-1-70b-instruct-v1:0
    provider: bedrock

  # Extra OpenAI-compatible vendors — add the ones you actually use.
  - model: mistral-large-latest
    provider: mistral
  - model: llama-3.3-70b-versatile
    provider: groq
  - model: grok-2-latest
    provider: xai
  - model: llama-3.1-sonar-large-128k-online
    provider: perplexity
  - model: meta-llama/Llama-3.3-70B-Instruct-Turbo
    provider: together
  - model: accounts/fireworks/models/llama-v3p3-70b-instruct
    provider: fireworks
  - model: anthropic/claude-3.5-sonnet
    provider: openrouter
  - model: command-r-plus
    provider: cohere
  - model: meta/llama-3.3-70b-instruct
    provider: nvidia
  - model: Qwen/Qwen2.5-72B-Instruct
    provider: siliconflow
  - model: abab6.5s-chat
    provider: minimax
  - model: Baichuan4
    provider: baichuan
  - model: step-1-8k
    provider: stepfun
  - model: generalv3.5
    provider: spark
  - model: yi-large
    provider: zero-one
  - model: hunyuan-pro
    provider: tencent
