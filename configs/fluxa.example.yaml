# Fluxa example configuration.
#
# Copy this file to fluxa.yaml and fill in the provider credentials. Every
# ${VAR} placeholder is expanded from the process environment at load time,
# so secrets can stay outside the YAML file and the same file works for dev,
# staging, and production.

server:
  host: 0.0.0.0
  port: 8080
  master_key: ${FLUXA_MASTER_KEY}   # Required once the Admin API ships in v2.0

database:
  path: ./fluxa.db                  # SQLite database used for key management (v2.0+)

providers:
  - name: openai
    kind: openai
    api_key: ${OPENAI_API_KEY}
    base_url: https://api.openai.com/v1

  - name: anthropic
    kind: anthropic
    api_key: ${ANTHROPIC_API_KEY}
    base_url: https://api.anthropic.com

  - name: deepseek
    kind: deepseek
    api_key: ${DEEPSEEK_API_KEY}
    base_url: https://api.deepseek.com/v1

  - name: qwen
    kind: qwen
    api_key: ${QWEN_API_KEY}
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

  - name: ollama
    kind: ollama
    base_url: http://localhost:11434/v1   # Ollama runs without an API key

  # --- v4.0 additional OpenAI-compatible providers ---

  - name: moonshot
    kind: moonshot                        # Kimi / Moonshot
    api_key: ${MOONSHOT_API_KEY}
    base_url: https://api.moonshot.cn/v1

  - name: zhipu
    kind: zhipu                           # 智谱 GLM
    api_key: ${ZHIPU_API_KEY}
    base_url: https://open.bigmodel.cn/api/paas/v4

  - name: doubao
    kind: doubao                          # 豆包 / Volcengine Ark
    api_key: ${DOUBAO_API_KEY}
    base_url: https://ark.cn-beijing.volces.com/api/v3

  - name: ernie
    kind: ernie                           # 文心一言 / Baidu Qianfan v2
    api_key: ${ERNIE_API_KEY}
    base_url: https://qianfan.baidubce.com/v2

routes:
  - model: gpt-4o
    provider: openai
    fallback: [deepseek]
  - model: gpt-4o-mini
    provider: openai
  - model: claude-3-5-sonnet
    provider: anthropic
  - model: claude-3-5-sonnet-20241022
    provider: anthropic
  - model: deepseek-chat
    provider: deepseek
  - model: deepseek-reasoner
    provider: deepseek
  - model: qwen-max
    provider: qwen
  - model: qwen-plus
    provider: qwen
  - model: llama3.1
    provider: ollama

  # v4.0 additional providers
  - model: moonshot-v1-8k
    provider: moonshot
  - model: moonshot-v1-32k
    provider: moonshot
  - model: kimi-k2-0711-preview
    provider: moonshot
  - model: glm-4
    provider: zhipu
  - model: glm-4-flash
    provider: zhipu
  - model: doubao-pro-32k
    provider: doubao
  - model: ernie-4.0-8k
    provider: ernie
  - model: ernie-3.5-8k
    provider: ernie

logging:
  level: info
  format: json
  store_content: false              # Set true to persist prompt bodies in the request log
